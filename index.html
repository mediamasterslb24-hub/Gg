<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aid Map Lebanon</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin: 0; }
#map { height: 100vh; }

/* تصميم البوكس */
.popup-box {
  font-family: Arial;
}

.popup-box b {
  font-size: 14px;
}

.urgent {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// خريطة لبنان
var map = L.map('map').setView([33.9, 35.5], 8);

// ستايل داكن (متل الصورة 🔥)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// تحديد موقع المستخدم
navigator.geolocation.getCurrentPosition(function(pos) {

  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;

  // دائرة (مثل heat)
  var circle = L.circle([lat, lng], {
    color: 'red',
    fillColor: '#ff4d4d',
    fillOpacity: 0.4,
    radius: 300
  }).addTo(map);

  // popup مثل التطبيق
  var popupContent = `
    <div class="popup-box">
      <b>طلب مساعدة</b><br>
      📍 موقعك الحالي<br><br>

      <span class="urgent">Critical shortage</span><br><br>

      🍞 أكل<br>
      💧 مي<br>
      💊 دواء<br><br>

      👥 5 أشخاص<br>
      ⏳ Updated now
    </div>
  `;

  circle.bindPopup(popupContent).openPopup();

  map.setView([lat, lng], 12);

});

// مثال نقاط (ناس تانيين)
var example = [
  [33.89, 35.48],
  [33.85, 35.55],
  [34.0, 35.65]
];

example.forEach(loc => {
  L.circle(loc, {
    color: 'red',
    fillColor: '#ff6666',
    fillOpacity: 0.3,
    radius: 250
  }).addTo(map);
});

</script>

</body>
</html>
